name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          # Provide dummy values so module-level code in sidekick_tools.py
          # doesn't fail on import (real API calls are mocked in tests)
          OPENAI_API_KEY: "sk-test-placeholder"
          SERPER_API_KEY: "test-placeholder"
          PUSHOVER_TOKEN: "test-placeholder"
          PUSHOVER_USER: "test-placeholder"
        run: uv run pytest --tb=short -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore
